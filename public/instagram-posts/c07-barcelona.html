<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tourism Paradox - 32 Million Visitors vs 1.6 Million Residents</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #1a1a1a; padding: 20px;
    }
    .post {
      width: 1080px; height: 1080px; background: #0a0a0a;
      position: relative; overflow: hidden; font-family: 'Inter', sans-serif;
    }
    .pattern {
      position: absolute; top: 0; left: 0; right: 0; bottom: 0; opacity: 0.03;
      background-image:
        radial-gradient(circle at 30% 50%, #c67557 1px, transparent 1px),
        radial-gradient(circle at 70% 50%, #c67557 1px, transparent 1px);
      background-size: 50px 50px;
    }
    .content {
      position: relative; z-index: 10; padding: 70px 80px 120px;
      height: 100%; display: flex; flex-direction: column;
    }
    .label {
      font-size: 13px; font-weight: 600; letter-spacing: 4px;
      text-transform: uppercase; color: #c67557; margin-bottom: 16px;
    }
    .headline {
      font-family: 'Playfair Display', serif; font-size: 42px;
      font-weight: 700; line-height: 1.15; color: #fdfdfb; margin-bottom: 40px;
    }
    .headline em { font-style: italic; color: #c67557; }
    .headline .small {
      font-size: 30px; font-weight: 400;
    }

    .ratio-section {
      text-align: center; margin-bottom: 36px;
    }
    .ratio-visual {
      display: flex; align-items: center; justify-content: center; gap: 20px;
      margin-bottom: 14px;
    }
    .ratio-block {
      display: flex; flex-wrap: wrap; gap: 4px; justify-content: center;
    }
    .ratio-dot {
      width: 18px; height: 18px; border-radius: 50%;
    }
    .ratio-dot.tourist { background: #c67557; }
    .ratio-dot.resident { background: #5b8c9e; }
    .ratio-text {
      font-family: 'Playfair Display', serif; font-size: 60px;
      font-weight: 900; color: #c67557; line-height: 1;
    }
    .ratio-label {
      font-size: 16px; color: #7c7c7c; margin-top: 4px;
    }
    .ratio-legend {
      display: flex; justify-content: center; gap: 30px; margin-top: 14px;
    }
    .legend-item {
      display: flex; align-items: center; gap: 8px; font-size: 13px; color: #7c7c7c;
    }
    .legend-dot {
      width: 10px; height: 10px; border-radius: 50%;
    }

    .stats-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 16px;
      margin-top: auto;
    }
    .stat-card {
      background: rgba(198,117,87,0.06); border: 1px solid rgba(198,117,87,0.15);
      border-radius: 10px; padding: 22px 24px; text-align: center;
    }
    .stat-card .num {
      font-family: 'Playfair Display', serif; font-size: 34px;
      font-weight: 700; color: #c67557;
    }
    .stat-card .desc {
      font-size: 13px; color: #7c7c7c; margin-top: 6px; line-height: 1.4;
    }

    .source {
      position: absolute; bottom: 72px; left: 80px; right: 80px;
      font-size: 11px; color: rgba(124,124,124,0.6); text-align: center;
    }
    .bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 30px 80px;
      border-top: 1px solid rgba(212,175,55,0.3);
      display: flex; justify-content: center; align-items: center;
    }
    .bottom-bar-text {
      font-family: 'Playfair Display', serif; font-size: 20px; color: #fdfdfb;
    }
  </style>
</head>
<body>
  <div class="post">
    <div class="pattern"></div>
    <div class="content">
      <div class="label">Tourism Paradox</div>
      <h1 class="headline"><em>32 Million</em> Visitors<br><span class="small">vs</span> 1.6 Million Residents</h1>

      <div class="ratio-section">
        <div class="ratio-visual">
          <div class="ratio-block">
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
            <div class="ratio-dot tourist"></div>
          </div>
          <div class="ratio-text">20:1</div>
          <div class="ratio-block">
            <div class="ratio-dot resident"></div>
          </div>
        </div>
        <div class="ratio-label">tourist-to-resident ratio</div>
        <div class="ratio-legend">
          <div class="legend-item"><div class="legend-dot" style="background:#c67557;"></div> Tourists</div>
          <div class="legend-item"><div class="legend-dot" style="background:#5b8c9e;"></div> Residents</div>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="num">16,000+</div>
          <div class="desc">Airbnb listings</div>
        </div>
        <div class="stat-card">
          <div class="num">+65-70%</div>
          <div class="desc">rent increase</div>
        </div>
        <div class="stat-card">
          <div class="num">900K</div>
          <div class="desc">cruise arrivals per year</div>
        </div>
        <div class="stat-card">
          <div class="num">2024</div>
          <div class="desc">anti-tourism protests</div>
        </div>
      </div>
    </div>

    <div class="source">Ajuntament de Barcelona 2024; Financial Times 2024</div>
    <div class="bottom-bar">
      <div class="bottom-bar-text">Cultural Innovation Lab</div>
    </div>
  </div>
</body>
</html>
