<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIL Instagram Post - Creative Industries % of GDP</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      display: flex; justify-content: center; align-items: center;
      min-height: 100vh; background: #1a1a1a; padding: 20px;
    }
    .post {
      width: 1080px; height: 1080px; background: #0a0a0a;
      position: relative; overflow: hidden; font-family: 'Inter', sans-serif;
    }
    .content {
      position: relative; z-index: 10;
      padding: 70px 80px 120px;
      height: 100%; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .label {
      font-size: 14px; font-weight: 500; letter-spacing: 4px;
      text-transform: uppercase; color: #d4af37; margin-bottom: 30px;
    }
    .headline {
      font-family: 'Playfair Display', serif;
      font-size: 56px; font-weight: 700; color: #fdfdfb;
      text-align: center; margin-bottom: 60px; line-height: 1.15;
    }
    .chart {
      width: 100%; max-width: 780px;
      display: flex; flex-direction: column; gap: 28px;
    }
    .row {
      display: flex; align-items: center; gap: 20px;
    }
    .country {
      width: 160px; text-align: right;
      font-size: 18px; font-weight: 400; color: #fdfdfb;
      letter-spacing: 0.5px;
    }
    .bar-track {
      flex: 1; height: 56px; background: rgba(255,255,255,0.03);
      border-radius: 8px; overflow: hidden; position: relative;
    }
    .bar-fill {
      height: 100%; border-radius: 8px;
      display: flex; align-items: center; justify-content: flex-end;
      padding-right: 20px;
      font-family: 'Playfair Display', serif;
      font-size: 28px; font-weight: 700; color: #fdfdfb;
      transition: width 0.6s ease;
    }
    .bar-fill span { font-size: 18px; color: rgba(253,253,251,0.6); margin-left: 2px; }
    .row:nth-child(1) .bar-fill {
      width: 100%; background: linear-gradient(90deg, rgba(212,175,55,0.2), #d4af37);
    }
    .row:nth-child(2) .bar-fill {
      width: 83.6%; background: linear-gradient(90deg, rgba(91,140,158,0.2), #5b8c9e);
    }
    .row:nth-child(3) .bar-fill {
      width: 59.7%; background: linear-gradient(90deg, rgba(168,181,160,0.2), #a8b5a0);
    }
    .row:nth-child(4) .bar-fill {
      width: 46.3%; background: linear-gradient(90deg, rgba(198,117,87,0.2), #c67557);
    }
    .flag {
      font-size: 32px; margin-right: 8px;
    }
    .source {
      position: absolute; bottom: 72px; left: 0; right: 0;
      text-align: center; font-size: 11px; color: rgba(124,124,124,0.6);
    }
    .bottom-bar {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 25px 80px; text-align: center;
      border-top: 1px solid rgba(212,175,55,0.2);
    }
    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 20px; font-weight: 700; color: #fdfdfb; letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="post">
    <div class="content">
      <div class="label">Country Comparison</div>
      <div class="headline">Creative Industries<br>% of GDP</div>

      <div class="chart">
        <div class="row">
          <div class="country">South Korea</div>
          <div class="bar-track">
            <div class="bar-fill">6.7<span>%</span></div>
          </div>
        </div>
        <div class="row">
          <div class="country">United Kingdom</div>
          <div class="bar-track">
            <div class="bar-fill">5.6<span>%</span></div>
          </div>
        </div>
        <div class="row">
          <div class="country">European Union</div>
          <div class="bar-track">
            <div class="bar-fill">4.0<span>%</span></div>
          </div>
        </div>
        <div class="row">
          <div class="country">Australia</div>
          <div class="bar-track">
            <div class="bar-fill">3.1<span>%</span></div>
          </div>
        </div>
      </div>
    </div>

    <div class="source">DCMS 2023; UNCTAD 2024</div>
    <div class="bottom-bar">
      <div class="logo">Cultural Innovation Lab</div>
    </div>
  </div>
</body>
</html>
