<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#06061a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative accent line -->
  <rect x="520" y="180" width="160" height="3" rx="1.5" fill="#c9a84c" opacity="0.8"/>
  <!-- Title -->
  <text fill="#f5f0e8" font-family="Georgia, 'Times New Roman', serif" font-size="52" font-weight="bold">
        <tspan x="600" y="260" text-anchor="middle">The Ultimate</tspan>
        <tspan x="600" y="320" text-anchor="middle">Reading List</tspan>
  </text>
  <!-- Subtitle -->
  <text x="600" y="400" text-anchor="middle" fill="#c9a84c" font-family="system-ui, -apple-system, sans-serif" font-size="22" letter-spacing="2" text-transform="uppercase">
    FOR CULTURAL ENTREPRENEURS
  </text>
  <!-- Bottom brand -->
  <text x="600" y="560" text-anchor="middle" fill="#f5f0e8" opacity="0.4" font-family="system-ui, sans-serif" font-size="16" letter-spacing="3">
    CULTURAL INNOVATION LAB
  </text>
</svg>