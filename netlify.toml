[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Omit NEXT_PUBLIC_* Supabase keys from secrets scanning.
  # These are intentionally inlined into the client bundle by Next.js
  # and are safe to expose (protected by Supabase Row Level Security).
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[plugins]]
  package = "@netlify/plugin-nextjs"
